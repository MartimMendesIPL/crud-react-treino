services:
    db:
        image: postgres:15
        environment:
            POSTGRES_USER: myuser
            POSTGRES_PASSWORD: mypassword
            POSTGRES_DB: crud_db
        ports:
            - "5433:5432"   # ← host:5433 para evitar conflito
        volumes:
            - ./init.sql:/docker-entrypoint-initdb.d/init.sql
            - postgres_data:/var/lib/postgresql/data

    pgadmin:
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@admin.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        depends_on:
            - db

    backend:
        build: ./backend
        ports:
            - "5000:5000"
        environment:
            DATABASE_URL: postgres://myuser:mypassword@db:5432/crud_db  # ← continua 5432 (rede interna)
        depends_on:
            - db

    frontend:
        build: ./frontend
        ports:
            - "5173:5173"
        depends_on:
            - backend

volumes:
    postgres_data:
